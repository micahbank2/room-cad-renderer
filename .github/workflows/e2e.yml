# Phase 36 Plan 02 — E2E Regression Harness
# Runs the Playwright 4-surface harness (wallpaper + wallArt + floor + ceiling)
# on every pull request targeting any branch. Chromium-only per 36-CONTEXT
# C-03 / C-04. No `paths:` filter per C-02 — every PR runs the suite.
#
# Permanent regression guard for VIZ-10 (Issue #94). Harness was shipped in
# Plan 36-01; no-repro outcome documented in
# .planning/phases/36-viz-10-regression/ROOT-CAUSE.md. Retained per R-04 so
# that any future defensive-code simplification or texture-pipeline refactor
# surfaces a regression BEFORE it reaches main.
#
# v1.15 SHARDING (post-Phase 62, suite > 85 tests across 2 projects):
# Each Playwright project (chromium-dev + chromium-preview) runs in its own
# parallel job via matrix. Halves wall-clock for the regression sweep —
# previous 35-min single-job runs now finish in ~10-12 min per shard.
#
# v1.18 POST-MERGE GATE (post-Phase 76, suite > 115 tests):
# E2E no longer runs on pull_request — the suite takes 45-60 min serially
# (workers:1 required by texture-cache singletons) and cannot reliably fit
# in any GitHub Actions job timeout. PRs are gated by vitest (800+ unit tests)
# which runs in ~30s. E2E runs on push to main as a post-merge safety net.
#
# If E2E fails on main after a merge: create a fix branch immediately and
# treat it as a P1 regression (the verifier agent + vitest should have caught
# most issues before merge, but texture/3D pipeline regressions need E2E).

name: E2E Regression Harness

on:
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      # Don't cancel the other shard if one fails — we want to see both results.
      fail-fast: false
      matrix:
        project: [chromium-dev, chromium-preview]
    name: e2e (${{ matrix.project }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
